{% extends "base.html" %}
{% block title %}{{ action }} Procurement — GovProcure{% endblock %}
{% block content %}
<div class="row"><div class="col-lg-6">
  <h2>{{ action }} Procurement</h2>
  <form method="post" class="mt-3">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3"><label class="form-label fw-semibold">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">{{ action }}</button>
    <a href="{% url 'procurement:list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>
</div></div>
{% endblock %}
