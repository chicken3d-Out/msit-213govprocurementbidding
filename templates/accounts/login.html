{% extends "base.html" %}
{% block title %}Login — GovProcure{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-4">
  <div class="card p-4">
    <h4 class="mb-3">Login</h4>
    <form method="post">{% csrf_token %}
      {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>{% endfor %}
      <button class="btn btn-primary w-100">Login</button>
    </form>
    <hr>
    <p class="text-center mb-0"><a href="{% url 'accounts:register_vendor' %}">Register as Vendor</a> &middot; <a href="{% url 'accounts:register_agency' %}">Register as Agency</a></p>
  </div>
</div></div>
{% endblock %}
