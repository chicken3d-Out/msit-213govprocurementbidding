{% extends "base.html" %}
{% block title %}Register as Vendor — GovProcure{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
  <div class="card p-4">
    <h4 class="mb-3">Register as Vendor</h4>
    <form method="post">{% csrf_token %}
      {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>{% endfor %}
      <button class="btn btn-primary w-100">Register</button>
    </form>
  </div>
</div></div>
{% endblock %}
